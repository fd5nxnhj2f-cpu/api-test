<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Test</title>
<style>
body{font-family:monospace;padding:20px;background:#111;color:#eee;font-size:13px;}
button{background:#1a3c5e;color:#fff;border:none;padding:10px 20px;margin:5px;border-radius:4px;cursor:pointer;font-family:monospace;font-size:13px;}
.result{margin:8px 0;padding:10px;border-radius:4px;background:#1a1a1a;}
.ok{border-left:3px solid #2d6a4f;}
.fail{border-left:3px solid #c1440e;}
.pending{border-left:3px solid #b5890a;}
pre{white-space:pre-wrap;word-break:break-all;margin-top:5px;font-size:11px;color:#aaa;}
</style>
</head>
<body>
<h2>API Test — tap each button, check what works</h2>
<p style="color:#aaa;margin-bottom:16px">This tests each API independently so we know what's actually available from your browser.</p>

<button onclick="testPolygonSnap()">1. Polygon Snapshot (prices)</button>
<button onclick="testFMPQuote()">2. FMP Quote (prices)</button>
<button onclick="testFMPMetrics()">3. FMP Key Metrics (PE/ROE/ROIC)</button>
<button onclick="testFMPRatios()">4. FMP Ratios TTM</button>
<button onclick="testFMPEarnings()">5. FMP Earnings Surprises</button>
<button onclick="testFMPInsider()">6. FMP Insider Trading</button>
<button onclick="testFMPDividends()">7. FMP Dividends</button>
<button onclick="testPolymarket()">8. Polymarket Earnings</button>
<button onclick="testAll()" style="background:#2d6a4f;">▶ TEST ALL</button>
<button onclick="document.getElementById('results').innerHTML=''" style="background:#555;">CLEAR</button>

<div id="results"></div>

<script>
const POLY_KEY = 'qw8YLK0T6kmETmJCxe3rrQNPam0jZHZl';
const FMP_KEY  = 'QpKQuSOpEfIEMfaWzSi5cKDI9HCZQbKp';
const FMP_BASE = 'https://financialmodelingprep.com/stable';
const TICKER   = 'KO'; // test with KO

function log(name, status, detail, data) {
  const div = document.createElement('div');
  div.className = `result ${status}`;
  let preview = '';
  if (data) {
    try {
      const d = typeof data === 'string' ? JSON.parse(data) : data;
      const sample = Array.isArray(d) ? d[0] : d;
      const useful = Object.entries(sample || {})
        .filter(([k,v]) => v != null && v !== '' && v !== 0)
        .slice(0, 12)
        .map(([k,v]) => `${k}: ${v}`)
        .join('\n');
      preview = `<pre>${useful || JSON.stringify(sample).slice(0,300)}</pre>`;
    } catch(e) {
      preview = `<pre>${String(data).slice(0, 200)}</pre>`;
    }
  }
  div.innerHTML = `<strong>${status === 'ok' ? '✓' : status === 'fail' ? '✗' : '⏳'} ${name}</strong><br><span style="font-size:11px;color:#aaa">${detail}</span>${preview}`;
  document.getElementById('results').prepend(div);
}

async function testPolygonSnap() {
  log('Polygon Snapshot', 'pending', 'Testing...');
  try {
    const tickers = 'AAPL,BAC,AXP,KO,CVX';
    const url = `https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers?tickers=${tickers}&apiKey=${POLY_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    const count = data.tickers?.length || 0;
    if (count > 0) {
      const t = data.tickers[0];
      log('Polygon Snapshot', 'ok', `✓ Got ${count} tickers. ${t.ticker}: $${t.day?.c || t.lastTrade?.p}`, data.tickers);
    } else {
      log('Polygon Snapshot', 'fail', `Got 0 tickers. Status: ${data.status}. ${JSON.stringify(data).slice(0,100)}`);
    }
  } catch(e) {
    log('Polygon Snapshot', 'fail', `Error: ${e.message}`);
  }
}

async function testFMPQuote() {
  log('FMP Quote', 'pending', 'Testing...');
  try {
    const url = `${FMP_BASE}/quote?symbol=AAPL,KO&apikey=${FMP_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      log('FMP Quote', 'ok', `✓ Got ${data.length} quotes. ${data[0].symbol}: $${data[0].price}`, data);
    } else {
      log('FMP Quote', 'fail', `Unexpected: ${JSON.stringify(data).slice(0,200)}`);
    }
  } catch(e) {
    log('FMP Quote', 'fail', `Error: ${e.message}`);
  }
}

    const res = await fetch(url);
    const data = await res.json();

    const url = `${FMP_BASE}/dividends?symbol=${TICKER}&apikey=${FMP_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data?.historical?.length > 0) {

async function testPolymarket() {
  log('Polymarket Earnings', 'pending', 'Testing...');
  try {
    const url = `https://gamma-api.polymarket.com/events?active=true&limit=5&keyword=KO+earnings`;
    const res = await fetch(url, {headers:{'Accept':'application/json'}});
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      log('Polymarket Earnings', 'ok', `✓ Got ${data.length} markets. First: "${data[0].title}"`, data);
    } else {
      log('Polymarket Earnings', 'fail', `Got empty array or error: ${JSON.stringify(data).slice(0,200)}`);
    }
  } catch(e) {
    log('Polymarket Earnings', 'fail', `Error: ${e.message}`);
  }
}

async function testAll() {
  document.getElementById('results').innerHTML = '';
  await testPolygonSnap();
  await new Promise(r=>setTimeout(r,1000));
  await testFMPQuote();
  await new Promise(r=>setTimeout(r,1000));
  await testFMPMetrics();
  await new Promise(r=>setTimeout(r,1000));
  await testFMPRatios();
  await new Promise(r=>setTimeout(r,1000));
  await testFMPEarnings();
  await new Promise(r=>setTimeout(r,1000));
  await testFMPInsider();
  await new Promise(r=>setTimeout(r,1000));
  await testFMPDividends();
  await new Promise(r=>setTimeout(r,1000));
  await testPolymarket();
}
</script>
</body>
</html>
